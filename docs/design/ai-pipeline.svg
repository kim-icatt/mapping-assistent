<svg width="1100" height="680" viewBox="0 0 1100 680" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F0F9FF"/>
    </linearGradient>
    <linearGradient id="ai-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="source-header-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="target-header-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="card-shadow" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#1e293b" flood-opacity="0.10"/>
    </filter>
    <filter id="ai-glow" x="-12%" y="-8%" width="124%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6366F1" flood-opacity="0.30"/>
    </filter>
    <marker id="arrow-indigo" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#6366F1"/>
    </marker>
    <marker id="arrow-slate" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="680" fill="url(#bg-grad)"/>

  <!-- ===== TITLE ===== -->
  <text x="550" y="40" text-anchor="middle" font-size="21" font-weight="700" fill="#0F172A">Mapping Assistent — AI-ondersteunde koppelingspipeline</text>
  <text x="550" y="60" text-anchor="middle" font-size="12" fill="#64748B">Grote OpenAPI-schema's worden geanalyseerd en vergeleken; de beheerder bevestigt elke AI-suggestie</text>

  <!-- ===== SOURCE SCHEMA CARD ===== -->
  <rect x="40" y="84" width="220" height="310" rx="12" fill="white" filter="url(#card-shadow)"/>
  <rect x="40" y="84" width="220" height="50" rx="12" fill="url(#source-header-grad)"/>
  <rect x="40" y="110" width="220" height="24" fill="#0284C7"/>
  <text x="150" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="white">Bronschema</text>
  <text x="150" y="126" text-anchor="middle" font-size="10" fill="#BAE6FD">OpenAPI-specificatie (bron)</text>

  <!-- Source fields -->
  <rect x="58" y="148" width="8" height="8" rx="2" fill="#0EA5E9"/>
  <text x="74" y="158" font-size="11" fill="#334155" font-weight="500">customerId</text>
  <text x="74" y="170" font-size="9" fill="#94A3B8">string · Uniek klantnummer</text>

  <rect x="58" y="182" width="8" height="8" rx="2" fill="#0EA5E9"/>
  <text x="74" y="192" font-size="11" fill="#334155" font-weight="500">orderDate</text>
  <text x="74" y="204" font-size="9" fill="#94A3B8">string · ISO 8601 datum</text>

  <rect x="58" y="216" width="8" height="8" rx="2" fill="#0EA5E9"/>
  <text x="74" y="226" font-size="11" fill="#334155" font-weight="500">totalAmount</text>
  <text x="74" y="238" font-size="9" fill="#94A3B8">number · Bedrag in euros</text>

  <rect x="58" y="250" width="8" height="8" rx="2" fill="#0EA5E9"/>
  <text x="74" y="260" font-size="11" fill="#334155" font-weight="500">status</text>
  <text x="74" y="272" font-size="9" fill="#94A3B8">enum · ACTIVE / CLOSED</text>

  <rect x="58" y="284" width="8" height="8" rx="2" fill="#0EA5E9"/>
  <text x="74" y="294" font-size="11" fill="#334155" font-weight="500">address.city</text>
  <text x="74" y="306" font-size="9" fill="#94A3B8">string · Plaatsnaam</text>

  <line x1="58" y1="324" x2="242" y2="324" stroke="#F1F5F9" stroke-width="1"/>
  <text x="150" y="340" text-anchor="middle" font-size="10" fill="#94A3B8">+ 247 velden meer...</text>
  <text x="150" y="356" text-anchor="middle" font-size="10" fill="#CBD5E1">Embedding-index gebouwd bij laden</text>
  <text x="150" y="370" text-anchor="middle" font-size="10" fill="#CBD5E1">Schema gecomprimeerd voor AI-call</text>

  <!-- ===== TARGET SCHEMA CARD ===== -->
  <rect x="840" y="84" width="220" height="310" rx="12" fill="white" filter="url(#card-shadow)"/>
  <rect x="840" y="84" width="220" height="50" rx="12" fill="url(#target-header-grad)"/>
  <rect x="840" y="110" width="220" height="24" fill="#059669"/>
  <text x="950" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="white">Doelschema</text>
  <text x="950" y="126" text-anchor="middle" font-size="10" fill="#A7F3D0">OpenAPI-specificatie (doel)</text>

  <!-- Target fields -->
  <rect x="858" y="148" width="8" height="8" rx="2" fill="#10B981"/>
  <text x="874" y="158" font-size="11" fill="#334155" font-weight="500">client_id</text>
  <text x="874" y="170" font-size="9" fill="#94A3B8">string · Verplicht · UUID</text>

  <rect x="858" y="182" width="8" height="8" rx="2" fill="#10B981"/>
  <text x="874" y="192" font-size="11" fill="#334155" font-weight="500">datum_bestelling</text>
  <text x="874" y="204" font-size="9" fill="#94A3B8">integer · Unix timestamp</text>

  <rect x="858" y="216" width="8" height="8" rx="2" fill="#10B981"/>
  <text x="874" y="226" font-size="11" fill="#334155" font-weight="500">totaal_bedrag_ct</text>
  <text x="874" y="238" font-size="9" fill="#94A3B8">integer · Bedrag in centen</text>

  <rect x="858" y="250" width="8" height="8" rx="2" fill="#10B981"/>
  <text x="874" y="260" font-size="11" fill="#334155" font-weight="500">status_code</text>
  <text x="874" y="272" font-size="9" fill="#94A3B8">integer · 1 / 0</text>

  <rect x="858" y="284" width="8" height="8" rx="2" fill="#10B981"/>
  <text x="874" y="294" font-size="11" fill="#334155" font-weight="500">woonplaats</text>
  <text x="874" y="306" font-size="9" fill="#94A3B8">string · Plaatsnaam gemeente</text>

  <line x1="858" y1="324" x2="1042" y2="324" stroke="#F1F5F9" stroke-width="1"/>
  <text x="950" y="340" text-anchor="middle" font-size="10" fill="#94A3B8">+ 189 velden meer...</text>
  <text x="950" y="356" text-anchor="middle" font-size="10" fill="#CBD5E1">Validatieregels afgeleid</text>
  <text x="950" y="370" text-anchor="middle" font-size="10" fill="#CBD5E1">uit veldbeschrijvingen</text>

  <!-- ===== HORIZONTAL ARROWS ===== -->
  <!-- Source → AI -->
  <line x1="262" y1="238" x2="418" y2="238" stroke="#6366F1" stroke-width="2.5" marker-end="url(#arrow-indigo)"/>
  <rect x="273" y="216" width="130" height="18" rx="4" fill="#EEF2FF"/>
  <text x="338" y="228" text-anchor="middle" font-size="10" fill="#6366F1" font-weight="600">schema-context</text>

  <!-- AI → Target -->
  <line x1="682" y1="238" x2="838" y2="238" stroke="#6366F1" stroke-width="2.5" marker-end="url(#arrow-indigo)"/>
  <rect x="697" y="216" width="124" height="18" rx="4" fill="#EEF2FF"/>
  <text x="759" y="228" text-anchor="middle" font-size="10" fill="#6366F1" font-weight="600">koppelingssuggesties</text>

  <!-- ===== AI CORE CARD ===== -->
  <rect x="420" y="76" width="260" height="376" rx="14" fill="url(#ai-grad)" filter="url(#ai-glow)"/>

  <!-- AI header -->
  <text x="550" y="107" text-anchor="middle" font-size="16" font-weight="700" fill="white">AI Assistent</text>
  <text x="550" y="124" text-anchor="middle" font-size="10" fill="#C7D2FE">Claude API (Anthropic)</text>
  <line x1="440" y1="134" x2="660" y2="134" stroke="#818CF8" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Pillar 1: Context Management -->
  <rect x="438" y="142" width="224" height="66" rx="8" fill="white" fill-opacity="0.13"/>
  <rect x="438" y="142" width="5" height="66" rx="2.5" fill="#818CF8"/>
  <text x="453" y="160" font-size="11" font-weight="600" fill="white">Contextbeheer</text>
  <text x="453" y="175" font-size="9" fill="#C7D2FE">Embedding-index per schema</text>
  <text x="453" y="188" font-size="9" fill="#C7D2FE">Schema-compressie + prompt caching</text>
  <text x="453" y="201" font-size="9" fill="#A5B4FC">Werkt bij 500+ velden</text>

  <!-- Pillar 2: Mapping Suggestions -->
  <rect x="438" y="218" width="224" height="66" rx="8" fill="white" fill-opacity="0.13"/>
  <rect x="438" y="218" width="5" height="66" rx="2.5" fill="#A5B4FC"/>
  <text x="453" y="236" font-size="11" font-weight="600" fill="white">Koppelingssuggesties</text>
  <text x="453" y="251" font-size="9" fill="#C7D2FE">Semantisch zoeken naar kandidaten</text>
  <text x="453" y="264" font-size="9" fill="#C7D2FE">LLM-redeneren + vertrouwensscore</text>
  <text x="453" y="277" font-size="9" fill="#A5B4FC">Uitleg per suggestie</text>

  <!-- Pillar 3: Transformation -->
  <rect x="438" y="294" width="224" height="66" rx="8" fill="white" fill-opacity="0.13"/>
  <rect x="438" y="294" width="5" height="66" rx="2.5" fill="#6EE7B7"/>
  <text x="453" y="312" font-size="11" font-weight="600" fill="white">Transformatiesuggesties</text>
  <text x="453" y="327" font-size="9" fill="#C7D2FE">JSONata-expressie bij type-mismatch</text>
  <text x="453" y="340" font-size="9" fill="#C7D2FE">Datum, enum, eenheid, concatenatie</text>
  <text x="453" y="353" font-size="9" fill="#A5B4FC">Voor/na-voorbeeld meegeleverd</text>

  <!-- Pillar 4: Validation -->
  <rect x="438" y="370" width="224" height="66" rx="8" fill="white" fill-opacity="0.13"/>
  <rect x="438" y="370" width="5" height="66" rx="2.5" fill="#FDE68A"/>
  <text x="453" y="388" font-size="11" font-weight="600" fill="white">Validatieregels</text>
  <text x="453" y="403" font-size="9" fill="#C7D2FE">Regels afleiden uit veldbeschrijvingen</text>
  <text x="453" y="416" font-size="9" fill="#C7D2FE">Veldafhankelijkheden detecteren</text>
  <text x="453" y="429" font-size="9" fill="#A5B4FC">Aanvullend op OpenAPI-constraints</text>

  <!-- ===== ARROW AI → Admin ===== -->
  <line x1="550" y1="454" x2="550" y2="482" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#arrow-slate)"/>

  <!-- ===== ADMIN REVIEW CARD ===== -->
  <rect x="330" y="484" width="440" height="72" rx="12" fill="white" filter="url(#card-shadow)"/>
  <rect x="330" y="484" width="6" height="72" rx="3" fill="#F59E0B"/>
  <text x="350" y="507" font-size="13" font-weight="600" fill="#1E293B">Beheerder beoordeelt</text>
  <text x="350" y="523" font-size="11" fill="#64748B">Elke suggestie wordt individueel geaccepteerd of afgewezen</text>
  <text x="350" y="537" font-size="11" fill="#64748B">Geen enkele koppeling wordt automatisch doorgevoerd</text>
  <rect x="606" y="496" width="80" height="24" rx="6" fill="#DCFCE7"/>
  <text x="646" y="512" text-anchor="middle" font-size="10" font-weight="600" fill="#15803D">Accepteer</text>
  <rect x="696" y="496" width="64" height="24" rx="6" fill="#FEE2E2"/>
  <text x="728" y="512" text-anchor="middle" font-size="10" font-weight="600" fill="#DC2626">Afwijzen</text>

  <!-- ===== ARROW Admin → Export ===== -->
  <line x1="550" y1="558" x2="550" y2="586" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#arrow-slate)"/>

  <!-- ===== EXPORT CARD ===== -->
  <rect x="370" y="588" width="360" height="60" rx="12" fill="white" filter="url(#card-shadow)"/>
  <rect x="370" y="588" width="6" height="60" rx="3" fill="#10B981"/>
  <text x="392" y="611" font-size="13" font-weight="600" fill="#1E293B">Exporteerbare koppeling</text>
  <text x="392" y="628" font-size="11" fill="#64748B">Gestructureerde JSON-export · direct verwerkbaar door downstream systemen</text>

  <!-- ===== SIDE NOTES ===== -->
  <!-- Left note -->
  <rect x="40" y="420" width="220" height="90" rx="8" fill="white" fill-opacity="0.80" stroke="#E2E8F0" stroke-width="1.2"/>
  <text x="56" y="440" font-size="10" font-weight="600" fill="#6366F1">Contextbeheer (grote specs)</text>
  <text x="56" y="456" font-size="9" fill="#475569">Embedding-index → snelle kandidaat-match</text>
  <text x="56" y="469" font-size="9" fill="#475569">Prompt cache → herhaalde calls goedkoop</text>
  <text x="56" y="482" font-size="9" fill="#475569">Schema-compressie → context binnen limiet</text>
  <text x="56" y="498" font-size="9" fill="#94A3B8">Vereist voor productie met grote specs</text>

  <!-- Right note -->
  <rect x="840" y="420" width="220" height="90" rx="8" fill="white" fill-opacity="0.80" stroke="#E2E8F0" stroke-width="1.2"/>
  <text x="856" y="440" font-size="10" font-weight="600" fill="#059669">AI-principe</text>
  <text x="856" y="456" font-size="9" fill="#475569">Beheerder bevestigt altijd — geen auto-apply</text>
  <text x="856" y="469" font-size="9" fill="#475569">Acceptatiepercentage bijgehouden</text>
  <text x="856" y="482" font-size="9" fill="#475569">AI-suggestie = voorstel, niet beslissing</text>
  <text x="856" y="498" font-size="9" fill="#94A3B8">AI-geassisteerd, menselijk bevestigd</text>

</svg>
